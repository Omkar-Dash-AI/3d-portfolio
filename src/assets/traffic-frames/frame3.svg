<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Road scene -->
  <rect width="800" height="600" fill="#2c3e50"/>
  <rect x="0" y="300" width="800" height="300" fill="#34495e"/>
  
  <!-- Road -->
  <rect x="0" y="350" width="800" height="200" fill="#7f8c8d"/>
  
  <!-- Road markings -->
  <rect x="50" y="450" width="100" height="10" fill="#ecf0f1"/>
  <rect x="200" y="450" width="100" height="10" fill="#ecf0f1"/>
  <rect x="350" y="450" width="100" height="10" fill="#ecf0f1"/>
  <rect x="500" y="450" width="100" height="10" fill="#ecf0f1"/>
  <rect x="650" y="450" width="100" height="10" fill="#ecf0f1"/>
  
  <!-- Buildings -->
  <rect x="50" y="50" width="150" height="250" fill="#2980b9"/>
  <rect x="250" y="100" width="120" height="200" fill="#8e44ad"/>
  <rect x="450" y="80" width="180" height="220" fill="#16a085"/>
  <rect x="680" y="120" width="100" height="180" fill="#c0392b"/>
  
  <!-- Windows -->
  <rect x="70" y="80" width="30" height="30" fill="#f1c40f"/>
  <rect x="120" y="80" width="30" height="30" fill="#f1c40f"/>
  <rect x="70" y="130" width="30" height="30" fill="#f1c40f"/>
  <rect x="120" y="130" width="30" height="30" fill="#f1c40f"/>
  <rect x="70" y="180" width="30" height="30" fill="#f1c40f"/>
  <rect x="120" y="180" width="30" height="30" fill="#f1c40f"/>
  
  <!-- Car 1 (moved) -->
  <rect x="80" y="400" width="120" height="60" rx="10" fill="#e74c3c"/>
  <rect x="100" y="420" width="40" height="25" fill="#ecf0f1"/>
  <rect x="160" y="420" width="20" height="25" fill="#ecf0f1"/>
  <circle cx="110" cy="470" r="15" fill="#2c3e50"/>
  <circle cx="170" cy="470" r="15" fill="#2c3e50"/>
  
  <!-- Car 2 (moved) -->
  <rect x="300" y="420" width="100" height="50" rx="10" fill="#3498db"/>
  <rect x="320" y="430" width="30" height="20" fill="#ecf0f1"/>
  <rect x="360" y="430" width="20" height="20" fill="#ecf0f1"/>
  <circle cx="320" cy="480" r="12" fill="#2c3e50"/>
  <circle cx="380" cy="480" r="12" fill="#2c3e50"/>
  
  <!-- Truck (moved) -->
  <rect x="500" y="390" width="140" height="70" rx="5" fill="#f39c12"/>
  <rect x="500" y="390" width="60" height="40" rx="5" fill="#d35400"/>
  <rect x="510" y="400" width="20" height="15" fill="#ecf0f1"/>
  <circle cx="520" cy="470" r="15" fill="#2c3e50"/>
  <circle cx="560" cy="470" r="15" fill="#2c3e50"/>
  <circle cx="600" cy="470" r="15" fill="#2c3e50"/>
  
  <!-- Person 1 (moved) -->
  <circle cx="360" y="500" r="15" fill="#e67e22"/>
  <rect x="355" y="515" width="10" height="30" fill="#e67e22"/>
  <line x1="355" y1="525" x2="340" y2="545" stroke="#e67e22" stroke-width="5"/>
  <line x1="365" y1="525" x2="380" y2="545" stroke="#e67e22" stroke-width="5"/>
  <line x1="355" y1="545" x2="350" y2="575" stroke="#e67e22" stroke-width="5"/>
  <line x1="365" y1="545" x2="370" y2="575" stroke="#e67e22" stroke-width="5"/>
  
  <!-- Person 2 (moved) -->
  <circle cx="450" y="480" r="15" fill="#9b59b6"/>
  <rect x="445" y="495" width="10" height="30" fill="#9b59b6"/>
  <line x1="445" y1="505" x2="430" y2="525" stroke="#9b59b6" stroke-width="5"/>
  <line x1="455" y1="505" x2="470" y2="525" stroke="#9b59b6" stroke-width="5"/>
  <line x1="445" y1="525" x2="440" y2="555" stroke="#9b59b6" stroke-width="5"/>
  <line x1="455" y1="525" x2="460" y2="555" stroke="#9b59b6" stroke-width="5"/>
  
  <!-- Bicycle (moved) -->
  <circle cx="620" cy="520" r="20" fill="none" stroke="#27ae60" stroke-width="3"/>
  <circle cx="680" cy="520" r="20" fill="none" stroke="#27ae60" stroke-width="3"/>
  <line x1="620" y1="520" x2="680" y2="520" stroke="#27ae60" stroke-width="3"/>
  <line x1="650" y1="520" x2="650" y2="480" stroke="#27ae60" stroke-width="3"/>
  <line x1="650" y1="480" x2="670" y2="500" stroke="#27ae60" stroke-width="3"/>
  <circle cx="650" cy="460" r="10" fill="#2ecc71"/>
  
  <!-- New car -->
  <rect x="700" y="410" width="90" height="55" rx="10" fill="#1abc9c"/>
  <rect x="715" y="425" width="35" height="20" fill="#ecf0f1"/>
  <rect x="760" y="425" width="15" height="20" fill="#ecf0f1"/>
  <circle cx="720" cy="475" r="12" fill="#2c3e50"/>
  <circle cx="770" cy="475" r="12" fill="#2c3e50"/>
  
  <!-- New person -->
  <circle cx="200" y="490" r="15" fill="#f1c40f"/>
  <rect x="195" y="505" width="10" height="30" fill="#f1c40f"/>
  <line x1="195" y1="515" x2="180" y2="535" stroke="#f1c40f" stroke-width="5"/>
  <line x1="205" y1="515" x2="220" y2="535" stroke="#f1c40f" stroke-width="5"/>
  <line x1="195" y1="535" x2="190" y2="565" stroke="#f1c40f" stroke-width="5"/>
  <line x1="205" y1="535" x2="210" y2="565" stroke="#f1c40f" stroke-width="5"/>
</svg>