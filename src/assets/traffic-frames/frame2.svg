<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Road scene -->
  <rect width="800" height="600" fill="#2c3e50"/>
  <rect x="0" y="300" width="800" height="300" fill="#34495e"/>
  
  <!-- Road -->
  <rect x="0" y="350" width="800" height="200" fill="#7f8c8d"/>
  
  <!-- Road markings -->
  <rect x="50" y="450" width="100" height="10" fill="#ecf0f1"/>
  <rect x="200" y="450" width="100" height="10" fill="#ecf0f1"/>
  <rect x="350" y="450" width="100" height="10" fill="#ecf0f1"/>
  <rect x="500" y="450" width="100" height="10" fill="#ecf0f1"/>
  <rect x="650" y="450" width="100" height="10" fill="#ecf0f1"/>
  
  <!-- Buildings -->
  <rect x="50" y="50" width="150" height="250" fill="#2980b9"/>
  <rect x="250" y="100" width="120" height="200" fill="#8e44ad"/>
  <rect x="450" y="80" width="180" height="220" fill="#16a085"/>
  <rect x="680" y="120" width="100" height="180" fill="#c0392b"/>
  
  <!-- Windows -->
  <rect x="70" y="80" width="30" height="30" fill="#f1c40f"/>
  <rect x="120" y="80" width="30" height="30" fill="#f1c40f"/>
  <rect x="70" y="130" width="30" height="30" fill="#f1c40f"/>
  <rect x="120" y="130" width="30" height="30" fill="#f1c40f"/>
  <rect x="70" y="180" width="30" height="30" fill="#f1c40f"/>
  <rect x="120" y="180" width="30" height="30" fill="#f1c40f"/>
  
  <!-- Car 1 (moved) -->
  <rect x="140" y="400" width="120" height="60" rx="10" fill="#e74c3c"/>
  <rect x="160" y="420" width="40" height="25" fill="#ecf0f1"/>
  <rect x="220" y="420" width="20" height="25" fill="#ecf0f1"/>
  <circle cx="170" cy="470" r="15" fill="#2c3e50"/>
  <circle cx="230" cy="470" r="15" fill="#2c3e50"/>
  
  <!-- Car 2 (moved) -->
  <rect x="400" y="420" width="100" height="50" rx="10" fill="#3498db"/>
  <rect x="420" y="430" width="30" height="20" fill="#ecf0f1"/>
  <rect x="460" y="430" width="20" height="20" fill="#ecf0f1"/>
  <circle cx="420" cy="480" r="12" fill="#2c3e50"/>
  <circle cx="480" cy="480" r="12" fill="#2c3e50"/>
  
  <!-- Truck (moved) -->
  <rect x="600" y="390" width="140" height="70" rx="5" fill="#f39c12"/>
  <rect x="600" y="390" width="60" height="40" rx="5" fill="#d35400"/>
  <rect x="610" y="400" width="20" height="15" fill="#ecf0f1"/>
  <circle cx="620" cy="470" r="15" fill="#2c3e50"/>
  <circle cx="660" cy="470" r="15" fill="#2c3e50"/>
  <circle cx="700" cy="470" r="15" fill="#2c3e50"/>
  
  <!-- Person 1 (moved) -->
  <circle cx="260" y="500" r="15" fill="#e67e22"/>
  <rect x="255" y="515" width="10" height="30" fill="#e67e22"/>
  <line x1="255" y1="525" x2="240" y2="545" stroke="#e67e22" stroke-width="5"/>
  <line x1="265" y1="525" x2="280" y2="545" stroke="#e67e22" stroke-width="5"/>
  <line x1="255" y1="545" x2="250" y2="575" stroke="#e67e22" stroke-width="5"/>
  <line x1="265" y1="545" x2="270" y2="575" stroke="#e67e22" stroke-width="5"/>
  
  <!-- Person 2 (new) -->
  <circle cx="350" y="480" r="15" fill="#9b59b6"/>
  <rect x="345" y="495" width="10" height="30" fill="#9b59b6"/>
  <line x1="345" y1="505" x2="330" y2="525" stroke="#9b59b6" stroke-width="5"/>
  <line x1="355" y1="505" x2="370" y2="525" stroke="#9b59b6" stroke-width="5"/>
  <line x1="345" y1="525" x2="340" y2="555" stroke="#9b59b6" stroke-width="5"/>
  <line x1="355" y1="525" x2="360" y2="555" stroke="#9b59b6" stroke-width="5"/>
  
  <!-- Bicycle (new) -->
  <circle cx="520" cy="520" r="20" fill="none" stroke="#27ae60" stroke-width="3"/>
  <circle cx="580" cy="520" r="20" fill="none" stroke="#27ae60" stroke-width="3"/>
  <line x1="520" y1="520" x2="580" y2="520" stroke="#27ae60" stroke-width="3"/>
  <line x1="550" y1="520" x2="550" y2="480" stroke="#27ae60" stroke-width="3"/>
  <line x1="550" y1="480" x2="570" y2="500" stroke="#27ae60" stroke-width="3"/>
  <circle cx="550" cy="460" r="10" fill="#2ecc71"/>
</svg>